<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Siddhi Seva Kendra Login</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#004aad,#0099ff);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:#fff;
padding:30px;
width:320px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,.3);
text-align:center;
}

h2{
color:#004aad;
}

input{
width:90%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:95%;
padding:12px;
background:#004aad;
color:#fff;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#003080;
}
</style>
</head>

<body>

<div class="login-box">

<h2>Siddhi Seva Kendra</h2>

<input type="text" id="user" placeholder="Username">

<input type="password" id="pass" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>
function login(){

let user=document.getElementById("user").value;
let pass=document.getElementById("pass").value;

if(user=="siddhi" && pass=="siddhi"){
window.location.href="index.html";
}else{
alert("Wrong Username or Password");
}

}
</script>

</body>
</html>
