<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siddhi Seva Kendra Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#004aad,#00a2ff);
}

.login-box{
width:350px;
background:#fff;
padding:30px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
text-align:center;
}

.login-box h2{
color:#004aad;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:15px;
}

button{
width:100%;
padding:12px;
background:#004aad;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#003080;
}

.note{
margin-top:15px;
font-size:13px;
color:#666;
}
</style>
</head>

<body>

<div class="login-box">

<h2>Siddhi Seva Kendra</h2>

<input type="text" id="user" placeholder="Username">

<input type="password" id="pass" placeholder="Password">

<button onclick="login()">Login</button>

<p class="note">Digital Service & Job Portal</p>

</div>

<script>

function login(){

var username=document.getElementById("user").value;
var password=document.getElementById("pass").value;

if(username==="admin" && password==="12345")
{
alert("Login Successful");
window.location.href="dashboard.html";
}
else
{
alert("Username: admin\nPassword: 12345");
}

}

</script>

</body>
</html>
